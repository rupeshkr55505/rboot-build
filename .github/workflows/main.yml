name: Build rBoot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESP8266 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Compile rBoot
        run: |
          # 1. Output folder banao
          mkdir -p firmware
          
          # 2. Zabardasti compilation (Direct Command)
          # Hum Makefile ke nakhre nahi jhelenge, seedha GCC chalayenge
          xtensa-lx106-elf-gcc -I. -O2 -fno-inline-functions -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot.c -o rboot.o
          
          # 3. Check karo file bani ya nahi, phir binary mein badlo
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "Success! Binary generated."
          else
            echo "Error: rboot.o was not created!"
            exit 1
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rboot-binary-file
          path: firmware/rboot.bin
