name: Build rBoot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Force Fix and Compile
        run: |
          mkdir -p firmware
          # 1. Sabhi files ko ek hi folder mein jama karo (koi folder ka chakkar hi khatam)
          find . -name "*.c" -exec cp {} . \;
          find . -name "*.h" -exec cp {} . \;
          find . -name "*.ld" -exec cp {} . \;

          # 2. Direct compilation: rboot.c ke liye jo files chahiye wo sab include karo
          # Hum sirf main rboot.bin par focus karenge jo aapko chahiye
          xtensa-lx106-elf-gcc -I. -O2 -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot.c -o rboot.o

          # 3. Agar rboot.o ban gaya toh turant .bin banao
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "Success: rboot.bin generated!"
          else
            echo "Failed to create rboot.o"
            exit 1
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rboot-binary-file
          path: firmware/rboot.bin
          
