name: Build rBoot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESP8266 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Compile rBoot
        run: |
          mkdir -p firmware
          
          # Sari files ko folder ke root mein rakho
          # Aur compiler ko bolo ki current directory (.) mein sab dhoonde
          
          xtensa-lx106-elf-gcc -I. -O2 -fno-inline-functions -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot.c -o rboot.o
          
          # Agar rboot.o ban gaya, toh binary banao
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "Success! Binary generated."
          else
            echo "Failed to create object file."
            exit 1
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rboot-binary-file
          path: firmware/rboot.bin
          
