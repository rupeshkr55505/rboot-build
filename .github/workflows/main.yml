name: Build rBoot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Fix Paths and Compile
        run: |
          mkdir -p firmware
          # 1. Jahan bhi files hain unhe dhoond kar bahar lao
          find . -name "*.c" -exec cp {} . \;
          find . -name "*.h" -exec cp {} . \;
          find . -name "*.ld" -exec cp {} . \;
          
          # 2. Ab compiler ko sab kuch samne milega (-I. ka matlab isi folder mein dhoondo)
          xtensa-lx106-elf-gcc -I. -O2 -fno-inline-functions -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot.c -o rboot.o
          xtensa-lx106-elf-gcc -I. -O2 -fno-inline-functions -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot-api.c -o rboot-api.o
          
          # 3. Binary banao
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "Success: File created!"
          else
            echo "Error: Compilation failed"
            exit 1
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rboot-binary
          path: firmware/rboot.bin
