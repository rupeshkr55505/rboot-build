name: rBoot Final Fix
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Build rBoot
        run: |
          mkdir -p firmware
          # Sari files ko ek jagah lao
          find . -type f -exec cp -t . {} +
          
          # 1. Missing files ko dummy bana do (Taaki error na aaye)
          touch rboot-integration.h rboot-hex2a.h rboot-api.h rboot-private.h
          
          # 2. rboot.h mein se integration wala lafda khatam karo
          sed -i '/RBOOT_INTEGRATION/d' rboot.h
          sed -i '/rboot-integration.h/d' rboot.h
          
          # 3. Compilation (Sabse basic tarike se)
          xtensa-lx106-elf-gcc -I. -O2 -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -w -c rboot.c -o rboot.o
          
          # 4. Final Binary
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "Bhai, Binary ban gayi hai!"
          else
            echo "Abhi bhi koi panga hai." && exit 1
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rboot-final-file
          path: firmware/rboot.bin
          
