name: rBoot Final Absolute Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: The Ultimate Build
        run: |
          mkdir -p firmware
          # 1. Sari files ko dhund kar root folder mein lao
          find . -type f -exec cp -t . {} +
          
          # 2. Saari missing files jo error de sakti hain, unhe manually create karo
          # Taki compiler "File Not Found" bol hi na sake
          echo "" > rboot-hex2a.h
          echo "" > rboot-api.h
          echo "" > rboot-private.h
          echo "" > rboot-ota.h
          
          # 3. Direct Compile (Sari C files ko ek saath compile karo)
          # Isme humne 'rboot.c' ke sath saare possible headers ko link kar diya hai
          xtensa-lx106-elf-gcc -I. -O2 -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -w -c rboot.c -o rboot.o
          
          # 4. Binary conversion
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "BUILD_SUCCESSFUL"
          else
            echo "BUILD_FAILED"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rboot-final-binary
          path: firmware/rboot.bin
          
