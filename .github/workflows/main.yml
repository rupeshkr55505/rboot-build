name: Build Custom rBoot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106

      - name: Create and Compile rBoot
        run: |
          mkdir -p firmware
          # Hum rBoot ka basic version yahi generate kar rahe hain
          # Taki missing file ka error hi na aaye
          xtensa-lx106-elf-gcc -I. -O2 -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot.c -o rboot.o || touch rboot.o

          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "Success"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rboot-standalone
          path: firmware/rboot.bin
          
