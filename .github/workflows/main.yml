name: Build rBoot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESP8266 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Compile rBoot
        run: |
          sed -i 's|ESPTOOL2 ?= ../esptool2/esptool2|ESPTOOL2 = esptool2|g' Makefile
          mkdir -p firmware
          make clean
          make
          if [ ! -f firmware/rboot.bin ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary build/rboot-stage2a.elf firmware/rboot.bin
          fi

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: rboot-binary-file
          path: firmware/rboot.bin
          
