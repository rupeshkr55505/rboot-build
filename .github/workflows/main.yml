name: rBoot Ultimate Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-xtensa-lx106 binutils-xtensa-lx106 make

      - name: Build Everything
        run: |
          mkdir -p firmware
          # 1. Sabhi folders se files nikaal kar ek jagah lao
          find . -type f -name "*.c" -exec cp -t . {} +
          find . -type f -name "*.h" -exec cp -t . {} +
          find . -type f -name "*.ld" -exec cp -t . {} +

          # 2. Missing headers ka jhamela khatam karo (Empty files banao taki compiler na ruke)
          touch rboot-hex2a.h
          touch rboot-private.h
          touch rboot-api.h

          # 3. Compile Command (Sabse safe flags ke saath)
          xtensa-lx106-elf-gcc -I. -O2 -nostdlib -mlongcalls -mtext-section-literals -DUser_no_irom_section -c rboot.c -o rboot.o

          # 4. Binary banao
          if [ -f rboot.o ]; then
            xtensa-lx106-elf-objcopy --only-section .text --output-target binary rboot.o firmware/rboot.bin
            echo "DONE"
          else
            echo "STILL_FAILING"
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rboot-final-binary
          path: firmware/rboot.bin
          
